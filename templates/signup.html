{% extends 'base.html' %}
{% block content %}

<div class="card">
<h2>Signup</h2>
<form method="POST">
  <input name="username" placeholder="Username">
  <input name="password" type="password" placeholder="Password">

  <select name="role">
    <option value="admin">Admin</option>
    <option value="member">Member</option>
  </select>

  <button>Signup</button>
</form>
<a href="/login">Login</a>
</div>

{% endblock %}
